<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        form {
            background-color: white;
            width: 320px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 5px;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        .error {
            color: red;
            font-size: 12px;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
        }
    </style>
</head>

<body>

<form onsubmit="return validateForm()">

    <label>Student Name</label>
    <input type="text" id="studentName">
    <div class="error" id="nameError"></div>

    <label>Institute Name</label>
    <input type="text" id="instituteName">
    <div class="error" id="instError"></div>

    <label>Phone Number</label>
    <input type="text" id="phone">
    <div class="error" id="phoneError"></div>

    <label>Email</label>
    <input type="text" id="email">
    <div class="error" id="emailError"></div>

    <label>Password</label>
    <input type="password" id="password">
    <div class="error" id="passError"></div>

    <button type="submit">Register</button>
</form>

<script>
function validateForm() {

    // Get values
    let studentName = document.getElementById("studentName").value.trim();
    let instituteName = document.getElementById("instituteName").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();

    // Clear old errors
    document.getElementById("nameError").innerHTML = "";
    document.getElementById("instError").innerHTML = "";
    document.getElementById("phoneError").innerHTML = "";
    document.getElementById("emailError").innerHTML = "";
    document.getElementById("passError").innerHTML = "";

    let isValid = true;
    let popupMsg = [];

    if (studentName === "") {
        document.getElementById("nameError").innerHTML = "Student name is required";
        popupMsg.push("Student name is invalid");
        isValid = false;
    }

    
    if (instituteName === "") {
        document.getElementById("instError").innerHTML = "Institute name is required";
        popupMsg.push("Institute name is invalid");
        isValid = false;
    }

    
    let phonePattern = /^[0-9]{10}$/;
    if (!phonePattern.test(phone)) {
        document.getElementById("phoneError").innerHTML = "Enter valid 10-digit phone number";
        popupMsg.push("Phone number is invalid");
        isValid = false;
    }

    
    let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailPattern.test(email)) {
        document.getElementById("emailError").innerHTML = "Enter valid email address";
        popupMsg.push("Email is invalid");
        isValid = false;
    }

    if (password.length < 6) {
        document.getElementById("passError").innerHTML = "Password must be at least 6 characters";
        isValid = false;
    }

  
    if (popupMsg.length > 0) {
        alert(popupMsg.join("\n"));
    }

    return isValid;
}
</script>

</body>
</html>
