<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EcoTrack — Registration</title>
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  <div class="auth-page">
    <nav class="top-nav">
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/feature">Features</a>
        <a href="#">How It Works</a>
        <a href="#">About</a>
      </div>
    </nav>

    <main class="auth-card">
      <h1 class="welcome">Join EcoTrack</h1>
      <h2 class="brand">EcoTrack</h2>
      <p class="subtitle">Create an account to start tracking your impact</p>

      <form id="registerForm" class="auth-form">
        <label>Full name</label>
        <div class="input-row">
          <span class="icon">👤</span>
          <input type="text" id="rname" placeholder="Your name" required>
        </div>
        <label>Email Address</label>
        <div class="input-row">
          <span class="icon">✉️</span>
          <input type="email" id="remail" placeholder="you@example.com" required>
        </div>
        <label>Password</label>
        <div class="input-row">
          <span class="icon">🔒</span>
          <input type="password" id="rpassword" placeholder="Password" required>
        </div>
        <button type="submit" id="registerBtn" class="btn primary">Create account</button>
        <div class="divider"><span>Or continue with</span></div>
        <button type="button" class="btn google">G Google</button>
        <div class="signup">Already have an account? <a href="/auth.html">Log in</a></div>
        
      </form>
    </main>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
