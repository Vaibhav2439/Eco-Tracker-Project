<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EcoTrack — Login</title>
  <link rel="stylesheet" href="/css/auth.css">
  <!-- Add Font Awesome for Google icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .validation-hint {
      display: block;
      font-size: 12px;
      margin-top: 5px;
      margin-bottom: 10px;
      font-style: italic;
      transition: all 0.3s ease;
    }
    .validation-hint.error {
      color: #ff6b6b;
    }
    .validation-hint.success {
      color: #2ecc71;
    }
    .input-row.error {
      border: 1px solid #ff6b6b !important;
      box-shadow: 0 0 5px rgba(255, 107, 107, 0.3);
    }
    .input-row.success {
      border: 1px solid #2ecc71 !important;
      box-shadow: 0 0 5px rgba(46, 204, 113, 0.3);
    }
    .pwd-toggle {
      background: transparent;
      border: none;
      color: #9aa3a9;
      cursor: pointer;
      font-size: 18px;
      padding: 0 8px;
      transition: all 0.2s ease;
    }
    .pwd-toggle:hover {
      color: #2ecc71;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <nav class="top-nav">
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/feature">Features</a>
        <a href="/work.html" class="nav-link">How It Works</a>
        <a href="/AboutUs.html">About</a>
      </div>
    </nav>

    <main class="auth-card">
      <h1 class="welcome">Welcome Back to</h1>
      <h2 class="brand">EcoTrack</h2>
      <p class="subtitle">Log in to continue your journey towards a sustainable future</p>

      <form id="loginForm" class="auth-form">
        <label>Email Address</label>
        <div class="input-row">
          <span class="icon">✉️</span>
          <input type="email" id="email" placeholder="you@gmail.com" required>
        </div>
        <small class="validation-hint" id="loginEmailHint"></small>

        <label>Password</label>
        <div class="input-row">
          <span class="icon">🔒</span>
          <input type="password" id="password" placeholder="Password" required>
          <button type="button" id="toggleLoginPwd" class="pwd-toggle">👁️</button>
        </div>
        <small class="validation-hint" id="loginPasswordHint"></small>

        <button type="submit" id="loginBtn" class="btn primary">→ Login</button>

        <div class="divider"><span>Or continue with</span></div>

        <button type="button" id="googleLogin" class="btn google">
          <i class="fa-brands fa-google"></i>
          Continue with Google
        </button>

        <div class="signup">Don't have an account? <a href="#" id="showRegister">Sign up</a></div>
      </form>

      <form id="registerForm" class="auth-form hidden">
        <label>Full name</label>
        <div class="input-row">
          <span class="icon">👤</span>
          <input type="text" id="rname" placeholder="Your name" required>
        </div>
        <small class="validation-hint" id="nameHint"></small>

        <label>Email Address</label>
        <div class="input-row">
          <span class="icon">✉️</span>
          <input type="email" id="remail" placeholder="you@gmail.com" required>
        </div>
        <small class="validation-hint" id="emailHint"></small>

        <label>Password</label>
        <div class="input-row">
          <span class="icon">🔒</span>
          <input type="password" id="rpassword" placeholder="Password" required>
          <button type="button" id="toggleRegisterPwd" class="pwd-toggle">👁️</button>
        </div>
        <small class="validation-hint" id="passwordHint"></small>

        <button type="submit" id="registerBtn" class="btn primary">Create account</button>
        <div class="signup">Already have an account? <a href="#" id="showLogin">Log in</a></div>
      </form>
    </main>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
